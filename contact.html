<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Little Taco Shop</title>
</head>
<body>

    <h1 id="top">Contact US</h1>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#about">About Tls</a></li>
        <li><a href="index.html#menu">Our Menu</a></li>
        <li><a href="./store.html">Store Hours</a></li>
    </ul>

    <figure>
        <img src="./media/contact1.png" alt="Tacos and a drink" width="300">
        <figcaption>Tacos And a Drink</figcaption>
    </figure>

    <h2>Our Contact Form</h2>

    <form>
        <fieldset>
            <legend>Send Us Message</legend>

            <p>
                <label for="name">Name :</label>
                <input type="text" id="name" name="name" placeholder="Enter Name">
            </p>

            <p>
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" placeholder="Enter Email">
            </p>

            <p>
                <label for="message">Your Message :</label><br>
                <textarea id="message" name="message" rows="10" cols="30"></textarea>
            </p>

        </fieldset>

        <br>
        <input type="submit" value="Send">
        <input type="reset" value="Reset">
    </form>

    <h2>Our Location</h2>

    <address>
        555 Taco Temptation Lane, Suite T<br>
        Taco Town, CA 90210<br>
        Phone: <a href="tel:+15555555555">555-555-5555</a>
    </address>

    <br>
    <a href="#top">Back to Top</a>

    <hr>

    <p>&copy; The Little Taco Shop</p>

</body>
</html>
